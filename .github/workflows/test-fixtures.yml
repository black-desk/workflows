name: Test fixtures

# Runs each build action against its minimal fixture under testdata/.
# Triggers on every push (so feature branches self-verify) and on PRs.
on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        action: [go, rust, meson, autotools]
    steps:
      - uses: actions/checkout@v6
      - name: Run ${{ matrix.action }} action against its fixture
        uses: ./${{ matrix.action }}
        with:
          working-directory: testdata/${{ matrix.action }}
