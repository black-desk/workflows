name: Continuous integration for rust projects

description: |-
  A GitHub Action for continuous integration of my personal Rust projects.

  This action requires following permissions:
    id-token: write
    contents: write

author: Chen Linxuan

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  working-directory:
    description: Directory to run the build/test commands in.
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Build and test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

    - name: Report code coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        use_oidc: true
        # cargo-llvm-cov writes lcov.info
        files: lcov.info
        fail_ci_if_error: true
        working-directory: ${{ inputs.working-directory }}
