name: Format checks

description: |-
  A GitHub Action for checking project formatting without scanning submodules.

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  working-directory:
    description: Directory to run formatter checks in.
    required: false
    default: "."

  clang-format-extra-patterns:
    description: |-
      Extra git pathspecs passed to clang-format file discovery, one per line.

      Use this for C/C++ headers without conventional suffixes, e.g.
      `include/**`.
    required: false
    default: ""

  clang-format-version:
    description: clang-format PyPI package version constraint.
    required: false
    default: "22.1.8"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install clang-format, Prettier and Black
      shell: bash
      env:
        CLANG_FORMAT_VERSION: ${{ inputs.clang-format-version }}
      run: |
        echo "::group::Install clang-format"
        python -m pip install --upgrade "clang-format==${CLANG_FORMAT_VERSION}"
        echo "::endgroup::"
        echo "::group::Install Prettier"
        npm install --global prettier
        echo "::endgroup::"
        echo "::group::Install Black"
        python -m pip install --upgrade black
        echo "::endgroup::"

    - name: Define tracked file discovery helper
      shell: bash
      run: |
        cat > "$RUNNER_TEMP/tracked-files.sh" <<'EOF'
        tracked_regular_files() {
          git ls-files -z -- "$@" |
            while IFS= read -r -d '' file; do
              if [ -f "$file" ] && [ ! -L "$file" ]; then
                printf '%s\0' "$file"
              fi
            done
        }
        EOF

    - name: Check Rust formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f Cargo.toml ]; then
          cargo fmt --check || {
            echo "::error::Rust code is not formatted. Run \`cargo fmt\` to fix."
            exit 1
          }
        fi

    - name: Check Go formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        source "$RUNNER_TEMP/tracked-files.sh"
        mapfile -d '' files < <(tracked_regular_files '*.go')
        if ((${#files[@]})); then
          unformatted="$(gofmt -l "${files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "::error::The following Go files are not formatted. Run \`gofmt -w\` on them:"
            while IFS= read -r file; do
              [ -n "$file" ] && echo "::error file=$file::Not formatted (run \`gofmt -w $file\`)"
            done <<< "$unformatted"
            exit 1
          fi
        fi

    - name: Check C/C++ formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLANG_FORMAT_EXTRA_PATTERNS: ${{ inputs.clang-format-extra-patterns }}
      run: |
        patterns=(
          '*.c'
          '*.h'
          '*.cc'
          '*.hh'
          '*.cpp'
          '*.hpp'
          '*.cxx'
          '*.hxx'
          '*.m'
          '*.mm'
        )
        while IFS= read -r pattern; do
          if [ -n "$pattern" ]; then
            patterns+=("$pattern")
          fi
        done <<< "$CLANG_FORMAT_EXTRA_PATTERNS"

        source "$RUNNER_TEMP/tracked-files.sh"
        mapfile -d '' files < <(tracked_regular_files "${patterns[@]}")
        if ((${#files[@]})); then
          failed=0
          for file in "${files[@]}"; do
            if ! out="$(clang-format --style=file --fallback-style=none --dry-run --Werror "$file" 2>&1)"; then
              echo "::error file=$file::Not formatted (run \`clang-format -i $file\`)"
              printf '%s\n' "$out"
              failed=1
            fi
          done
          if [ "$failed" = 1 ]; then
            exit 1
          fi
        fi

    - name: Check Python formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        source "$RUNNER_TEMP/tracked-files.sh"
        mapfile -d '' files < <(tracked_regular_files '*.py' '*.pyi')
        if ((${#files[@]})); then
          black_args=(--check --diff)
          if [ -f .black.toml ]; then
            black_args+=(--config .black.toml)
          elif [ -f pyproject.toml ]; then
            :
          else
            echo "Skipping Black: no .black.toml or pyproject.toml found"
            black_args=()
          fi
          if ((${#black_args[@]})); then
            if ! out="$(black "${black_args[@]}" "${files[@]}" 2>&1)"; then
              echo "::error::Black found formatting issues. See diff above."
              printf '%s\n' "$out"
              while IFS= read -r line; do
                if [[ "$line" == "would reformat "* ]]; then
                  file="${line#would reformat }"
                  [ -f "$file" ] && echo "::error file=$file::Not formatted (run \`black $file\`)"
                fi
              done <<< "$out"
              exit 1
            fi
          fi
        fi

    - name: Check Prettier formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        configs=(
          .prettierrc
          .prettierrc.cjs
          .prettierrc.js
          .prettierrc.json
          .prettierrc.mjs
          .prettierrc.toml
          .prettierrc.yaml
          .prettierrc.yml
          prettier.config.cjs
          prettier.config.js
          prettier.config.mjs
          prettier.config.ts
        )
        has_config=false
        for config in "${configs[@]}"; do
          if [ -e "$config" ]; then
            has_config=true
            break
          fi
        done
        if [ "$has_config" = false ]; then
          echo "Skipping Prettier: no Prettier config found"
          exit 0
        fi

        source "$RUNNER_TEMP/tracked-files.sh"
        mapfile -d '' files < <(
          tracked_regular_files \
            '*.css' \
            '*.graphql' \
            '*.html' \
            '*.js' \
            '*.json' \
            '*.jsonc' \
            '*.jsx' \
            '*.md' \
            '*.mdx' \
            '*.mjs' \
            '*.scss' \
            '*.svelte' \
            '*.ts' \
            '*.tsx' \
            '*.vue' \
            '*.yaml' \
            '*.yml'
        )
        if ((${#files[@]})); then
          if ! unformatted="$(prettier --list-different --ignore-unknown "${files[@]}" 2>&1)"; then
            printf '%s\n' "$unformatted"
            echo "::error::Prettier reported issues. See output above; run \`prettier --write\` on the listed files."
            while IFS= read -r file; do
              [ -n "$file" ] && [ -f "$file" ] && echo "::error file=$file::Not formatted (run \`prettier --write $file\`)"
            done <<< "$unformatted"
            exit 1
          fi
        fi
