name: Format checks

description: |-
  A GitHub Action for checking project formatting without scanning submodules.

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  working-directory:
    description: Directory to run formatter checks in.
    required: false
    default: "."

  clang-format-extra-patterns:
    description: |-
      Extra git pathspecs passed to clang-format file discovery, one per line.

      Use this for C/C++ headers without conventional suffixes, e.g.
      `include/**`.
    required: false
    default: ""

  clang-format-version:
    description: clang-format PyPI package version constraint.
    required: false
    default: "22.1.8"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install clang-format, Prettier and Black
      shell: bash
      env:
        CLANG_FORMAT_VERSION: ${{ inputs.clang-format-version }}
      run: |
        python -m pip install --upgrade "clang-format==${CLANG_FORMAT_VERSION}"
        npm install --global prettier
        python -m pip install --upgrade black

    - name: Check Rust formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f Cargo.toml ]; then
          cargo fmt --check
        fi

    - name: Check Go formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mapfile -d '' files < <(git ls-files -z -- '*.go')
        if ((${#files[@]})); then
          unformatted="$(gofmt -l "${files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
        fi

    - name: Check C/C++ formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLANG_FORMAT_EXTRA_PATTERNS: ${{ inputs.clang-format-extra-patterns }}
      run: |
        patterns=(
          '*.c'
          '*.h'
          '*.cc'
          '*.hh'
          '*.cpp'
          '*.hpp'
          '*.cxx'
          '*.hxx'
          '*.m'
          '*.mm'
        )
        while IFS= read -r pattern; do
          if [ -n "$pattern" ]; then
            patterns+=("$pattern")
          fi
        done <<< "$CLANG_FORMAT_EXTRA_PATTERNS"

        mapfile -d '' files < <(git ls-files -z -- "${patterns[@]}")
        if ((${#files[@]})); then
          clang-format --style=file --fallback-style=none --dry-run --Werror "${files[@]}"
        fi

    - name: Check Python formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mapfile -d '' files < <(git ls-files -z -- '*.py' '*.pyi')
        if ((${#files[@]})); then
          if [ -f .black.toml ]; then
            black --config .black.toml --check --diff "${files[@]}"
          elif [ -f pyproject.toml ]; then
            black --check --diff "${files[@]}"
          else
            echo "Skipping Black: no .black.toml or pyproject.toml found"
          fi
        fi

    - name: Check Prettier formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        configs=(
          .prettierrc
          .prettierrc.cjs
          .prettierrc.js
          .prettierrc.json
          .prettierrc.mjs
          .prettierrc.toml
          .prettierrc.yaml
          .prettierrc.yml
          prettier.config.cjs
          prettier.config.js
          prettier.config.mjs
          prettier.config.ts
        )
        has_config=false
        for config in "${configs[@]}"; do
          if [ -e "$config" ]; then
            has_config=true
            break
          fi
        done
        if [ "$has_config" = false ]; then
          echo "Skipping Prettier: no Prettier config found"
          exit 0
        fi

        mapfile -d '' files < <(
          git ls-files -z -- \
            '*.css' \
            '*.graphql' \
            '*.html' \
            '*.js' \
            '*.json' \
            '*.jsonc' \
            '*.jsx' \
            '*.md' \
            '*.mdx' \
            '*.mjs' \
            '*.scss' \
            '*.svelte' \
            '*.ts' \
            '*.tsx' \
            '*.vue' \
            '*.yaml' \
            '*.yml'
        )
        if ((${#files[@]})); then
          prettier --check --ignore-unknown "${files[@]}"
        fi
