name: Continuous delivery for rust projects

description: |-
  A GitHub Action for continuous delivery of my personal rust projects.

  This action requires following permissions:
    contents: write
    id-token: write

  This action publishes to crates.io via Trusted Publishing (OIDC), so no
  long-lived API token is required. See the README for prerequisites, e.g.
  the first version of a crate must still be published manually.

author: Chen Linxuan

branding:
  icon: 'check-circle'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - if: github.event_name == 'push'
      id: tag
      name: Generate new version tag if any
      shell: bash
      run: |
        if [ "${{ runner.debug }}" = "1" ]; then
          tree
        fi

        script="./scripts/get-project-version.sh"
        if [ ! -f "$script" ]; then
          script="./tools/get-project-version.sh"
        fi

        if [ -f "$script" ]; then
          echo "Using script: $script" >&2
          version="$("$script")"
        elif [ -f "Cargo.lock" ]; then
          echo "Using cargo to get version" >&2
          version=v"$(cargo pkgid | awk -F'[#@]' '{print $NF}')"
        else
          echo "Failed to determine project version" >&2
          exit 1
        fi

        if git rev-parse "$version" &>/dev/null; then
          echo "Tag $version already exists" >&2
          exit
        fi

        git tag "$version"
        echo version="$version" >> $GITHUB_OUTPUT

    - if: steps.tag.outputs.version != '' || (github.event_name == 'push' && startsWith(github.ref_name, 'v'))
      name: Authenticate to crates.io via trusted publishing
      uses: rust-lang/crates-io-auth-action@v1
      id: auth

    - if: steps.tag.outputs.version != '' || (github.event_name == 'push' && startsWith(github.ref_name, 'v'))
      name: Publish to crates.io
      shell: bash
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
