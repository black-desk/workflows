name: Test fixtures

# Runs each build action against its minimal fixture under testdata/.
# Triggers on every push (so feature branches self-verify) and on PRs.
#
# Each action gets its own job (rather than a matrix) because a step's
# `uses` field may not contain dynamic expressions, so the action path
# must be hardcoded anyway.
on:
  pull_request:
  push:

jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./go
        with:
          working-directory: testdata/go

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./rust
        with:
          working-directory: testdata/rust

  meson:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./meson
        with:
          working-directory: testdata/meson

  autotools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./autotools
        with:
          working-directory: testdata/autotools
