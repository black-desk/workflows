name: Continuous integration for autotools projects

description: |-
  A GitHub Action for continuous integration of my personal autotools projects.

  This action requires following permissions:
    id-token: write
    contents: write

author: Chen Linxuan

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  working-directory:
    description: Directory to run the build/test commands in.
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install coverage tool (lcov)
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            sudo apt-get update -qq && sudo apt-get install -y -qq lcov
            ;;
          macOS)
            brew install lcov
            ;;
        esac

    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f configure ]; then
          ./configure
        else
          echo >&2 "'configure' script not found. Skipping configuration step"
        fi
        make
        if make -n test &>/dev/null; then
          make test
        else
          echo >&2 "'test' target not found. Skipping testing"
        fi

    - name: Report code coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        use_oidc: true
        # Upload whichever coverage artifact the autotools project produced.
        files: ./coverage/.resultset.json,lcov.info,coverage.txt
        fail_ci_if_error: true
        working-directory: ${{ inputs.working-directory }}
