name: Continuous integration for rust projects

description: |-
  A GitHub Action for continuous integration of my personal Rust projects.

  This action requires following permissions:
    id-token: write
    contents: write

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  working-directory:
    description: Directory to run the build/test commands in.
    required: false
    default: "."

  cargo-flags:
    description: |-
      Flags passed to `cargo`. Defaults to `--all-features`.

      Pass e.g. `--features serde,tokio` to enable specific features, or
      `--no-default-features --features foo` to disable the default features.
    required: false
    default: "--all-features"

  toolchain:
    description: |-
      Rust toolchain channel or version to install (e.g. `stable`, or a precise
      version like `1.87`). Defaults to `stable`; pass the project's MSRV
      (`rust-version` in Cargo.toml) to verify it still builds on the minimum
      supported Rust.
    required: false
    default: "stable"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      # `@master` (not `@stable`) is required when using the `toolchain` input —
      # a channel ref like `@stable` would select the channel itself and ignore
      # the input. See https://github.com/dtolnay/rust-toolchain#readme.
      uses: dtolnay/rust-toolchain@master
      with:
        components: clippy
        toolchain: ${{ inputs.toolchain }}

    - name: Verify Cargo.lock is up to date
      # Fail fast if Cargo.lock lags behind Cargo.toml — e.g. a version bump
      # that wasn't followed by `cargo build`/`cargo update` to refresh it.
      # `cargo metadata --locked` refuses to rewrite the lockfile and exits
      # non-zero, surfacing the problem at PR time rather than letting a
      # release action read the stale version. Only enforced when a lockfile
      # is committed — `--locked` also refuses to create one, which would
      # false-positive on crates that don't commit a lockfile (e.g. libraries).
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if git ls-files -- Cargo.lock '*/Cargo.lock' | grep -q .; then
          cargo metadata --locked --format-version 1 >/dev/null
        fi

    - name: Clippy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # Route the input through env rather than interpolating `${{ ... }}`
        # directly into the script to avoid shell injection.
        CARGO_FLAGS: ${{ inputs.cargo-flags }}
      run: |
        # Split into an array so the flags are passed as separate arguments
        # (quoted expansion), without word-splitting or globbing side effects.
        read -ra cargo_flags <<< "$CARGO_FLAGS"
        echo "::group::cargo clippy"
        cargo clippy "${cargo_flags[@]}" --workspace --all-targets -- -D warnings || {
          echo "::error::Clippy reported warnings. Fix them above, run \`cargo clippy --fix\` to auto-fix, or add \`#[allow(...)]\` for intentional lints."
          exit 1
        }
        echo "::endgroup::"

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Build and test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # Route the input through env rather than interpolating `${{ ... }}`
        # directly into the script to avoid shell injection.
        CARGO_FLAGS: ${{ inputs.cargo-flags }}
      run: |
        # Split into an array so the flags are passed as separate arguments
        # (quoted expansion), without word-splitting or globbing side effects.
        read -ra cargo_flags <<< "$CARGO_FLAGS"
        cargo llvm-cov "${cargo_flags[@]}" --workspace --lcov --output-path lcov.info || {
          echo "::error::Build or tests failed. See the compiler/test output above for the failing file and line."
          exit 1
        }

    - name: Report code coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        use_oidc: true
        # cargo-llvm-cov writes lcov.info
        files: lcov.info
        fail_ci_if_error: true
        working-directory: ${{ inputs.working-directory }}
