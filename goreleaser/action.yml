name: Automatic release via goreleaser

description: |-
  A GitHub Action for continuous integration of my personal golang projects.

  This action requires following permissions:
    contents: write

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Zig toolchain
      uses: mlugg/setup-zig@v2

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true
        cache-dependency-path: ${{ github.workspace }}/go.sum

    - if: github.event_name == 'push'
      id: tag
      name: Generate new version tag if any
      shell: bash
      run: |
        if [ "${{ runner.debug }}" = "1" ] && command -v tree >/dev/null 2>&1; then
          tree
        fi

        script="./scripts/get-project-version.sh"
        if [ ! -f "$script" ]; then
          script="./tools/get-project-version.sh"
        fi

        if [ -f "$script" ]; then
          echo "Using script: $script" >&2
          version="$("$script")"
        elif [ -f "Cargo.lock" ]; then
          echo "Using cargo to get version" >&2
          version=v"$(cargo pkgid | awk -F'[#@]' '{print $NF}')"
        else
          echo "Failed to determine project version" >&2
          exit 1
        fi

        if git rev-parse "refs/tags/$version" &>/dev/null; then
          echo "Tag $version already exists" >&2
          exit
        fi

        git tag "$version"
        echo version="$version" >> $GITHUB_OUTPUT

    - if: steps.tag.outputs.version != ''
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CUSTOM_TAG: ${{ steps.tag.outputs.version }}

    - if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ github.token }}
