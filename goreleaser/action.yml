name: Automatic release via goreleaser

description: |-
  A GitHub Action for continuous integration of my personal golang projects.

  This action requires following permissions:
    contents: write

author: Chen Linxuan

branding:
  icon: 'check-circle'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - uses: ./common

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Zig toolchain
      uses: mlugg/setup-zig@v2

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true
        cache-dependency-path: ${{ github.workspace }}/go.sum

    - if: github.event_name == 'push'
      name: Generate new version tag if any
      uses: ./tag
      id: tag

    - if: steps.tag.outputs.version != ''
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CUSTOM_TAG: ${{ steps.tag.outputs.version }}

    - if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ github.token }}
