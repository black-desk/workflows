name: Generic github action

description: |-
  This is a generic GitHub Action
  which should be running on all my personal projects
  to keep the code clean.

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: "false"
    - name: Lint code with black-desk/clean
      uses: black-desk/clean-action@master
    - name: Lint code with black-desk/up2date
      uses: black-desk/up2date-action@master
    - name: Lint code with REUSE
      uses: fsfe/reuse-action@v6
    - name: Lint code with gitleaks
      uses: gitleaks/gitleaks-action@v3
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - if: github.event_name == 'pull_request'
      name: Set up Node for commitlint
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - if: github.event_name == 'pull_request'
      name: Lint commit messages with commitlint
      shell: bash
      run: |
        npm install -g @commitlint/cli @commitlint/config-conventional

        FROM="${{ github.event.push.before }}"
        TO="${{ github.event.push.after }}"

        if [ "${{ github.event_name }}" == "pull_request" ]; then
          FROM="${{ github.event.pull_request.base.sha }}"
          TO="${{ github.event.pull_request.head.sha }}"
        fi

        if [ -z "$FROM" ]; then
          exit 1
        fi

        if [ -z "$TO" ]; then
          exit 1
        fi

        if commitlint --last &>/dev/null; then
          commitlint --verbose --from "$FROM" --to "$TO"
          exit
        fi

        CONFIG="$(mktemp commitlint.config.XXXXXXXXXX.js)"
        echo "Config file of commitlint missing, generate default config at $CONFIG" >&2

        # NOTE: https://github.com/dependabot/dependabot-core/issues/2445#issuecomment-949633412
        cat > "$CONFIG" <<EOF
        module.exports = {
          extends: ['@commitlint/config-conventional'],
          ignores: [(message) => /^Bumps \[.+]\(.+\) from .+ to .+\.$/m.test(message)],
        }
        EOF

        commitlint --verbose --from "$FROM" --to "$TO" --config "$CONFIG"
