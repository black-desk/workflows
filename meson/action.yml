name: Continuous integration for meson projects

description: |-
  A GitHub Action for continuous integration of my personal meson projects.

  This action requires following permissions:
    id-token: write
    contents: write

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  working-directory:
    description: Directory to run the build/test commands in.
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install build dependencies
      shell: bash
      run: |
        echo "::group::Install meson, ninja, gcovr"
        pip install meson ninja gcovr
        echo "::endgroup::"

    - name: Setup build directory
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        meson setup builddir -Db_coverage=true || {
          echo "::error::\`meson setup\` failed. Check the meson output above for missing dependencies or configuration errors."
          exit 1
        }

    - name: Compile
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        meson compile -C builddir || {
          echo "::error::Compilation failed. See the compiler errors above for the failing source file and line."
          exit 1
        }

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        meson test -C builddir -v || {
          echo "::error::Tests failed. See the test output above for the failing test case."
          exit 1
        }

    - name: Generate coverage report
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ninja -C builddir coverage
        gcovr --lcov --root . --output lcov.info builddir

    - name: Report code coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        use_oidc: true
        # gcovr --lcov writes lcov.info
        files: lcov.info
        fail_ci_if_error: true
        working-directory: ${{ inputs.working-directory }}
