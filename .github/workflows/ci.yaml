name: Continuous integration

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 0 * * 0" # weekly, catches rotting dependencies
  workflow_dispatch:

jobs:
  generic:
    name: Generic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: ./generic

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Set up shared format config
        run: |
          ln -s .format/.clang-format .clang-format
          ln -s .format/.editorconfig .editorconfig
          ln -s .format/.prettierrc .prettierrc
      - uses: ./format

  # Each build action runs against its minimal fixture under testdata/. They
  # are separate jobs (not a matrix) because a step's `uses` field may not
  # contain dynamic expressions, so the action path must be hardcoded anyway.
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./go
        with:
          working-directory: testdata/go

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./rust
        with:
          working-directory: testdata/rust

  meson:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./meson
        with:
          working-directory: testdata/meson

  autotools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./autotools
        with:
          working-directory: testdata/autotools

  pass:
    name: pass
    if: always()
    needs: [generic, format, go, rust, meson, autotools]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
