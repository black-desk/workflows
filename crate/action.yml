name: Continuous delivery for rust projects

description: |-
  A GitHub Action for continuous delivery of my personal rust projects.

  This action requires following permissions:
    contents: write
    id-token: write

  This action publishes to crates.io via Trusted Publishing (OIDC), so no
  long-lived API token is required. See the README for prerequisites, e.g.
  the first version of a crate must still be published manually.

author: Chen Linxuan

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  working-directory:
    description: |-
      Directory containing the project to publish (where `Cargo.toml` lives).
      Defaults to the repository root. Set this for a non-root package in a
      workspace.
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - if: github.event_name == 'push'
      id: tag
      name: Generate new version tag if any
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        if [ "${{ runner.debug }}" = "1" ] && command -v tree >/dev/null 2>&1; then
          tree
        fi

        script="./scripts/get-project-version.sh"
        if [ ! -f "$script" ]; then
          script="./tools/get-project-version.sh"
        fi

        if [ -f "$script" ]; then
          echo "Using script: $script"
          version="$("$script")"
        elif [ -f "Cargo.toml" ]; then
          echo "Using cargo to get version"
          if ! version="v$(cargo pkgid | awk -F'[#@]' '{print $NF}')"; then
            echo "::error::Failed to parse version from \`cargo pkgid\`. In a workspace, ensure there is a single root package or provide ./scripts/get-project-version.sh."
            exit 1
          fi
        else
          echo "::error::Failed to determine project version. Tried ./scripts/get-project-version.sh, ./tools/get-project-version.sh, and Cargo.toml."
          exit 1
        fi

        if git rev-parse "refs/tags/$version" &>/dev/null; then
          echo "Tag $version already exists"
          exit
        fi

        git tag "$version"
        echo version="$version" >> $GITHUB_OUTPUT

    - if: steps.tag.outputs.version != ''
      name: Authenticate to crates.io via trusted publishing
      uses: rust-lang/crates-io-auth-action@v1
      id: auth

    - if: steps.tag.outputs.version != ''
      name: Publish to crates.io
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
